  /api/v1/pizza-index/targets/{target_id}/activity:
    get:
      tags: [pizza-index]
      summary: Get a single Pizza Index target activity snapshot
      description: |
        Returns the latest normalized activity snapshot for a monitored target.
        The backend uses the PizzINT dashboard JSON as the primary upstream and
        only falls back to SerpApi when the upstream fails, omits the target,
        or returns no meaningful busyness signal.
      operationId: getPizzaIndexTargetActivity
      parameters:
        - in: path
          name: target_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pizza Index target activity returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PizzaIndexTargetActivity"
              examples:
                default:
                  value:
                    target_id: dominos_pentagon_city
                    display_name: "Domino's Pizza - Pentagon City"
                    provider: pizzint
                    provider_mode: primary
                    collected_at: "2026-03-07T13:40:00Z"
                    data_quality: full
                    capture_status: pizzint_dashboard_ok
                    is_open: true
                    current_busyness_percent: 78
                    usual_busyness_percent: 45
                    busyness_delta_percent: 33
                    current_busyness_label: busier_than_usual
                    rating: null
                    reviews_count: null
                    address: null
                    google_maps_url: "https://www.google.com/maps/place/Domino's+Pizza/@38.8627308,-77.0879692,17z/data=!3m1!4b1"
        "404":
          description: Target ID is not present in the Pizza Index registry
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required: [detail]
                properties:
                  detail:
                    type: string
              examples:
                default:
                  value:
                    detail: "Unknown pizza-index target: unknown"

  /api/v1/pizza-index/latest:
    get:
      tags: [pizza-index]
      summary: Get the latest aggregate Pizza Index snapshot
      description: |
        Returns the latest persisted aggregate Pizza Index snapshot, derived
        from the newest per-target activity observations stored in SQLite.
      operationId: getLatestPizzaIndex
      responses:
        "200":
          description: Pizza Index snapshot returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PizzaIndexSnapshotResponse"
              examples:
                default:
                  value:
                    generated_at: "2026-03-07T13:40:30Z"
                    pizza_index: 0.46
                    pizza_index_confidence: 0.92
                    quality_summary:
                      full_count: 4
                      partial_count: 1
                      unavailable_count: 0
                    targets:
                      - target_id: dominos_pentagon_city
                        display_name: "Domino's Pizza - Pentagon City"
                        target_score: 0.66
                        weight: 1.0
                        data_quality: full
                        provider: pizzint
                      - target_id: papa_johns_pentagon_city
                        display_name: "Papa Johns Pizza - Pentagon City"
                        target_score: 0.18
                        weight: 0.95
                        data_quality: partial
                        provider: serpapi

  /api/v1/pizza-index/refresh:
    post:
      tags: [pizza-index]
      summary: Force a refresh of the aggregate Pizza Index snapshot
      description: |
        Refreshes Pizza Index source collection across all active targets and
        persists the resulting aggregate snapshot in SQLite.
        In planned dashboard orchestration, the main `Refresh Signals` action
        uses this source refresh as the Pizza Index collection step before the
        broader signal snapshot is recomputed and stored.
      operationId: refreshPizzaIndex
      responses:
        "200":
          description: Pizza Index snapshot refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PizzaIndexSnapshotResponse"
              examples:
                default:
                  value:
                    generated_at: "2026-03-07T13:41:00Z"
                    pizza_index: 0.51
                    pizza_index_confidence: 1.0
                    quality_summary:
                      full_count: 4
                      partial_count: 0
                      unavailable_count: 1
                    targets:
                      - target_id: dominos_pentagon_city
                        display_name: "Domino's Pizza - Pentagon City"
                        target_score: 0.66
                        weight: 1.0
                        data_quality: full
                        provider: pizzint

  /api/v1/risk/score:
    post:
      tags: [risk]
      summary: Score a feature set using the MVP weighted model
      operationId: scoreRisk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskScoreRequest"
            examples:
              default:
                value:
                  features:
                    flight_anomaly: 0.68
                    notam_spike: 0.34
                    satellite_buildup: 0.21
                    news_volume: 0.57
                    osint_activity: 0.46
                    pizza_index: 0.12
      responses:
        "200":
          description: Risk score computed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskScoreResponse"
              examples:
                default:
                  value:
                    score: 0.508
                    classification: watch
                    breakdown:
                      - feature: flight_anomaly
                        value: 0.68
                        weight: 0.4
                        contribution: 0.272
                      - feature: notam_spike
                        value: 0.34
                        weight: 0.2
                        contribution: 0.068
                      - feature: satellite_buildup
                        value: 0.21
                        weight: 0.0
                        contribution: 0.0
                      - feature: news_volume
                        value: 0.57
                        weight: 0.2667
                        contribution: 0.152
                      - feature: osint_activity
                        value: 0.46
                        weight: 0.0
                        contribution: 0.0
                      - feature: pizza_index
                        value: 0.12
                        weight: 0.1333
                        contribution: 0.016
                    thresholds:
                      watch: 0.4
                      alert: 0.65
        "422":
          description: Invalid scoring request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/markets/opportunities:
    get:
      tags: [markets]
      summary: Get current model-versus-market pricing opportunities
      description: |
        Collects geopolitical market probabilities from Polymarket Gamma when
        reachable. If Gamma is inaccessible from the runtime, the backend falls
        back to the `pizzint.watch` breaking-markets API before degrading to
        bootstrap sample data.
        Each load is expected to be persisted in SQLite as a historical
        Polymarket market snapshot, and the returned opportunity set is the
        latest persisted model-versus-market comparison output.
      operationId: getMarketOpportunities
      responses:
        "200":
          description: Market opportunities returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketOpportunitiesResponse"
              examples:
                default:
                  value:
                    generated_at: "2026-03-07T09:00:00Z"
                    source:
                      name: Polymarket
                      status: active
                      mode: live
                      last_checked_at: "2026-03-07T09:00:00Z"
                    upstream: gamma
                    opportunities:
                      - market_id: pol-001
                        question: "Will a direct strike occur in region X before June 2026?"
                        market_probability: 0.31
                        model_probability: 0.42
                        edge: 0.11
                        signal: BUY
                      - market_id: pol-002
                        question: "Will emergency mobilization be announced in region Y before May 2026?"
                        market_probability: 0.58
                        model_probability: 0.41
                        edge: -0.17
                        signal: SELL

  /api/v1/alerts:
    get:
      tags: [alerts]
      summary: Get persisted analyst alert history
      operationId: getAlerts
      responses:
        "200":
          description: Alert history returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertHistoryResponse"
              examples:
                default:
                  value:
                    generated_at: "2026-03-07T09:10:00Z"
                    alerts:
                      - id: "alert-001"
                        created_at: "2026-03-07T09:08:00Z"
                        market_id: "poly-market-1"
                        question: "Will a major cross-border strike occur in the Middle East within 30 days?"
                        market_probability: 0.43
                        model_probability: 0.61
                        edge: 0.18
                        signal: BUY
                        status: open

  /api/v1/alerts/evaluate:
    post:
      tags: [alerts]
      summary: Evaluate current opportunities and persist analyst alerts
      description: |
        Dashboard-level action for the main `Evaluate Alerts` control.
        The planned behavior is to reload the latest relevant Polymarket market
        opportunities, use the current model percentage from the latest signal
        state, re-evaluate edge for each opportunity, persist both the market
        load and evaluation output in SQLite, and then emit or update
        analyst-facing alert records.
      operationId: evaluateAlerts
      responses:
        "200":
          description: Alert evaluation completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertEvaluationResponse"
              examples:
                default:
                  value:
                    evaluated_at: "2026-03-07T09:10:00Z"
                    created_count: 1
                    alerts:
                      - id: "alert-001"
                        created_at: "2026-03-07T09:10:00Z"
                        market_id: "poly-market-1"
                        question: "Will a major cross-border strike occur in the Middle East within 30 days?"
                        market_probability: 0.43
                        model_probability: 0.61
                        edge: 0.18
                        signal: BUY
                        status: open

components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, version]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: predict-strike-api
        version:
          type: string
          example: 0.1.0

    FeatureVector:
      type: object
      additionalProperties: false
      required:
        - flight_anomaly
        - notam_spike
        - satellite_buildup
        - news_volume
        - osint_activity
        - pizza_index
      properties:
        flight_anomaly:
          type: number
          minimum: 0
          maximum: 1
        notam_spike:
          type: number
          minimum: 0
          maximum: 1
        satellite_buildup:
          type: number
          minimum: 0
          maximum: 1
        news_volume:
          type: number
          minimum: 0
          maximum: 1
        osint_activity:
          type: number
          minimum: 0
          maximum: 1
        pizza_index:
          type: number
          minimum: 0
          maximum: 1

    FeatureWeights:
      type: object
      additionalProperties: false
      properties:
        flight_anomaly:
          type: number
          minimum: 0
          maximum: 1
        notam_spike:
          type: number
          minimum: 0
          maximum: 1
        satellite_buildup:
          type: number
          minimum: 0
          maximum: 1
        news_volume:
          type: number
          minimum: 0
          maximum: 1
        osint_activity:
          type: number
          minimum: 0
          maximum: 1
        pizza_index:
          type: number
          minimum: 0
          maximum: 1
      description: |
        Optional override weights for the scoring pass. The backend may normalize
        these before calculating the final score.

    SignalSource:
      type: object
      additionalProperties: false
      required: [name, status, mode]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [planned, active, degraded]
        mode:
          type: string
          enum: [live, fallback, static_baseline]
        last_checked_at:
          type:
            - string
            - "null"
          format: date-time

    SignalSnapshot:
      type: object
      additionalProperties: false
      required: [generated_at, region_focus, features, sources]
      properties:
        generated_at:
          type: string
          format: date-time
        region_focus:
          type: string
          description: Inferred suspicious region for the current snapshot, derived from the highest concentration of suspicious military-adjacent flights
        features:
          $ref: "#/components/schemas/FeatureVector"
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SignalSource"

    SignalSourceRefreshRequest:
      type: object
      additionalProperties: false
      required: [source_name]
      properties:
        source_name:
          type: string

    SignalSourceRefreshResponse:
      type: object
      additionalProperties: false
      required: [source, snapshot]
      properties:
        source:
          $ref: "#/components/schemas/SignalSource"
        snapshot:
          $ref: "#/components/schemas/SignalSnapshot"

    OpenSkySignalRefreshResponse:
      type: object
      additionalProperties: false
      required: [source, snapshot, assessment]
      properties:
        source:
          $ref: "#/components/schemas/SignalSource"
        snapshot:
          $ref: "#/components/schemas/SignalSnapshot"
        assessment:
          $ref: "#/components/schemas/OpenSkyStrikeAssessment"

    GdeltAssessmentStatus:
      type: string
      enum: [ready, disabled, error]

    GdeltSignalAssessment:
      type: object
      additionalProperties: false
      required:
        - status
        - prompt_version
        - probability_percent
        - target_region
        - target_country
        - summary
        - assessed_article_count
        - freshness_score
      properties:
        status:
          $ref: "#/components/schemas/GdeltAssessmentStatus"
        prompt_version:
          type: string
        probability_percent:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 100
        target_region:
          type:
            - string
            - "null"
        target_country:
          type:
            - string
            - "null"
        summary:
          type: string
        assessed_article_count:
          type: integer
          minimum: 0
        freshness_score:
          type: number
          minimum: 0
          maximum: 1

    GdeltSignalRefreshResponse:
      type: object
      additionalProperties: false
      required: [source, snapshot, assessment]
      properties:
        source:
          $ref: "#/components/schemas/SignalSource"
        snapshot:
          $ref: "#/components/schemas/SignalSnapshot"
        assessment:
          $ref: "#/components/schemas/GdeltSignalAssessment"

    OpenSkyAnomaly:
      type: object
      additionalProperties: false
      required: [icao24, reasons]
      properties:
        icao24:
          type: string
        callsign:
          type:
            - string
            - "null"
        origin_country:
          type:
            - string
            - "null"
        latitude:
          type:
            - number
            - "null"
        longitude:
          type:
            - number
            - "null"
        baro_altitude:
          type:
            - number
            - "null"
        velocity:
          type:
            - number
            - "null"
        geo_altitude:
          type:
            - number
            - "null"
        reasons:
          type: array
          items:
            type: string

    OpenSkyAnomaliesResponse:
      type: object
      additionalProperties: false
      required: [generated_at, status, flight_anomaly, assessment, anomalies]
      properties:
        generated_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [planned, active, degraded]
        flight_anomaly:
          type: number
          minimum: 0
          maximum: 1
        assessment:
          $ref: "#/components/schemas/OpenSkyStrikeAssessment"
        anomalies:
          type: array
          items:
            $ref: "#/components/schemas/OpenSkyAnomaly"

    OpenSkyAssessmentStatus:
      type: string
      enum: [ready, disabled, error]

    OpenSkyStrikeAssessment:
      type: object
      additionalProperties: false
      required:
        - status
        - prompt_version
        - probability_percent
        - countries
        - explanation
      properties:
        status:
          $ref: "#/components/schemas/OpenSkyAssessmentStatus"
        prompt_version:
          type: string
        probability_percent:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 100
        countries:
          type: array
          items:
            type: string
        explanation:
          type:
            - string
            - "null"

    GdeltCountBreakdown:
      type: object
      additionalProperties: false
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer
          minimum: 0

    GdeltHeadline:
      type: object
      additionalProperties: false
      required:
        - article_id
        - title
        - source_label
        - is_alert
        - is_us_nato_actor
        - is_action_indicative
        - freshness_score
        - themes
        - regions
      properties:
        article_id:
          type: string
        title:
          type: string
        source:
          type:
            - string
            - "null"
        source_label:
          type: string
        published_at:
          type:
            - string
            - "null"
          format: date-time
        url:
          type:
            - string
            - "null"
        is_alert:
          type: boolean
        is_us_nato_actor:
          type: boolean
        is_action_indicative:
          type: boolean
        freshness_score:
          type: number
          minimum: 0
          maximum: 1
        themes:
          type: array
          items:
            type: string
        regions:
          type: array
          items:
            type: string

    GdeltProvenance:
      type: object
      additionalProperties: false
      required:
        - source_url_configured
        - keyword_watchlist
        - theme_derivation
        - region_derivation
        - comparison_basis
      properties:
        source_url_configured:
          type: boolean
        keyword_watchlist:
          type: array
          items:
            type: string
        theme_derivation:
          type: string
        region_derivation:
          type: string
        comparison_basis:
          type: string

    GdeltDetailResponse:
      type: object
      additionalProperties: false
      required:
        - generated_at
        - status
        - news_volume
        - article_count
        - alert_article_count
        - signal_article_count
        - freshness_score
        - alert_share
        - top_regions
        - top_themes
        - top_sources
        - headlines
        - assessment
        - provenance
      properties:
        generated_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [planned, active, degraded]
        news_volume:
          type: number
          minimum: 0
          maximum: 1
        article_count:
          type: integer
          minimum: 0
        alert_article_count:
          type: integer
          minimum: 0
        signal_article_count:
          type: integer
          minimum: 0
        freshness_score:
          type: number
          minimum: 0
          maximum: 1
        alert_share:
          type: number
          minimum: 0
          maximum: 1
        volume_delta:
          type:
            - number
            - "null"
        top_regions:
          type: array
          items:
            $ref: "#/components/schemas/GdeltCountBreakdown"
        top_themes:
          type: array
          items:
            $ref: "#/components/schemas/GdeltCountBreakdown"
        top_sources:
          type: array
          items:
            $ref: "#/components/schemas/GdeltCountBreakdown"
        headlines:
          type: array
          items:
            $ref: "#/components/schemas/GdeltHeadline"
        assessment:
          $ref: "#/components/schemas/GdeltSignalAssessment"
        provenance:
          $ref: "#/components/schemas/GdeltProvenance"

    RiskScoreRequest:
      type: object
      additionalProperties: false
      required: [features]
      properties:
        features:
          $ref: "#/components/schemas/FeatureVector"
        weights:
          $ref: "#/components/schemas/FeatureWeights"

    RiskBreakdownItem:
      type: object
      additionalProperties: false
      required: [feature, value, weight, contribution]
      properties:
        feature:
          type: string
          enum:
            - flight_anomaly
            - notam_spike
            - satellite_buildup
            - news_volume
            - osint_activity
            - pizza_index
        value:
          type: number
          minimum: 0
          maximum: 1
        weight:
          type: number
          minimum: 0
          maximum: 1
        contribution:
          type: number
          minimum: 0
          maximum: 1

    RiskThresholds:
      type: object
      additionalProperties: false
      required: [watch, alert]
      properties:
        watch:
          type: number
          minimum: 0
          maximum: 1
        alert:
          type: number
          minimum: 0
          maximum: 1

    RiskScoreResponse:
      type: object
      additionalProperties: false
      required: [score, classification, breakdown, thresholds]
      properties:
        score:
          type: number
          minimum: 0
          maximum: 1
        classification:
          type: string
          enum: [monitor, watch, alert]
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/RiskBreakdownItem"
        thresholds:
          $ref: "#/components/schemas/RiskThresholds"

    MarketOpportunity:
      type: object
      additionalProperties: false
      description: One persisted model-versus-market comparison row from a historical opportunity snapshot.
      required:
        - market_id
        - question
        - market_probability
        - model_probability
        - edge
        - signal
      properties:
        market_id:
          type: string
        question:
          type: string
        market_probability:
          type: number
          minimum: 0
          maximum: 1
        model_probability:
          type: number
          minimum: 0
          maximum: 1
        edge:
          type: number
          minimum: -1
          maximum: 1
        signal:
          type: string
          enum: [BUY, HOLD, SELL]

    MarketOpportunitiesResponse:
      type: object
      additionalProperties: false
      description: Latest persisted market-opportunity snapshot derived from a historical Polymarket load.
      required: [generated_at, source, upstream, opportunities]
      properties:
        generated_at:
          type: string
          format: date-time
        source:
          $ref: "#/components/schemas/SignalSource"
        upstream:
          type: string
          enum: [gamma, pizzint, bootstrap]
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/MarketOpportunity"

    PizzaIndexTarget:
      type: object
      additionalProperties: false
      required:
        - target_id
        - display_name
        - category
        - priority_weight
        - location_cluster
        - google_maps_url
        - active
      properties:
        target_id:
          type: string
        display_name:
          type: string
        category:
          type: string
        priority_weight:
          type: number
          exclusiveMinimum: 0
        location_cluster:
          type: string
        google_maps_url:
          type: string
        active:
          type: boolean

    PizzaIndexTargetsResponse:
      type: object
      additionalProperties: false
      required: [generated_at, targets]
      properties:
        generated_at:
          type: string
          format: date-time
        targets:
          type: array
          items:
            $ref: "#/components/schemas/PizzaIndexTarget"

    PizzaIndexTargetActivity:
      type: object
      additionalProperties: false
      required:
        - target_id
        - display_name
        - provider
        - provider_mode
        - collected_at
        - data_quality
        - capture_status
        - google_maps_url
      properties:
        target_id:
          type: string
        display_name:
          type: string
        provider:
          type: string
          enum: [pizzint, serpapi, stub]
        provider_mode:
          type: string
          enum: [primary, fallback, stub]
        collected_at:
          type: string
          format: date-time
        data_quality:
          type: string
          enum: [full, partial, unavailable]
        capture_status:
          type: string
        is_open:
          type:
            - boolean
            - "null"
        current_busyness_percent:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 100
        usual_busyness_percent:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 100
        busyness_delta_percent:
          type:
            - integer
            - "null"
          minimum: -100
          maximum: 100
        current_busyness_label:
          type:
            - string
            - "null"
        rating:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 5
        reviews_count:
          type:
            - integer
            - "null"
          minimum: 0
        address:
          type:
            - string
            - "null"
        google_maps_url:
          type: string

    PizzaIndexQualitySummary:
      type: object
      additionalProperties: false
      required: [full_count, partial_count, unavailable_count]
      properties:
        full_count:
          type: integer
          minimum: 0
        partial_count:
          type: integer
          minimum: 0
        unavailable_count:
          type: integer
          minimum: 0

    PizzaIndexTargetContribution:
      type: object
      additionalProperties: false
      required:
        - target_id
        - display_name
        - target_score
        - weight
        - data_quality
        - provider
      properties:
        target_id:
          type: string
        display_name:
          type: string
        target_score:
          type: number
          minimum: 0
          maximum: 1
        weight:
          type: number
          exclusiveMinimum: 0
        data_quality:
          type: string
          enum: [full, partial, unavailable]
        provider:
          type: string
          enum: [pizzint, serpapi, stub]

    PizzaIndexSnapshotResponse:
      type: object
      additionalProperties: false
      required:
        - generated_at
        - pizza_index
        - pizza_index_confidence
        - quality_summary
        - targets
      properties:
        generated_at:
          type: string
          format: date-time
        pizza_index:
          type: number
          minimum: 0
          maximum: 1
        pizza_index_confidence:
          type: number
          minimum: 0
          maximum: 1
        quality_summary:
          $ref: "#/components/schemas/PizzaIndexQualitySummary"
        targets:
          type: array
          items:
            $ref: "#/components/schemas/PizzaIndexTargetContribution"

    AlertRecord:
      type: object
      additionalProperties: false
      required:
        - id
        - created_at
        - market_id
        - question
        - market_probability
        - model_probability
        - edge
        - signal
        - status
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        market_id:
          type: string
        question:
          type: string
        market_probability:
          type: number
          minimum: 0
          maximum: 1
        model_probability:
          type: number
          minimum: 0
          maximum: 1
        edge:
          type: number
          minimum: -1
          maximum: 1
        signal:
          type: string
          enum: [BUY, HOLD, SELL]
        status:
          type: string
          enum: [open, dismissed, resolved]

    AlertHistoryResponse:
      type: object
      additionalProperties: false
      description: Persisted analyst alert records derived from prior evaluation runs.
      required: [generated_at, alerts]
      properties:
        generated_at:
          type: string
          format: date-time
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/AlertRecord"

    AlertEvaluationResponse:
      type: object
      additionalProperties: false
      description: Persisted output of a single alert-evaluation run over the latest opportunity snapshot.
      required: [evaluated_at, created_count, alerts]
      properties:
        evaluated_at:
          type: string
          format: date-time
        created_count:
          type: integer
          minimum: 0
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/AlertRecord"

    Error:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          type: string
        code:
          type:
            - string
            - "null"
