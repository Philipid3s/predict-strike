openapi: 3.1.0
info:
  title: Predict Strike API
  version: 0.1.0
  description: |
    Initial backend contract for the Predict Strike MVP.

    This contract is intentionally limited to health, signal snapshot,
    Pizza Index activity monitoring, transparent risk scoring, and
    market-opportunity comparison endpoints.
    Some sources still fall back to stub data, but Pizza Index activity now
    supports a live PizzINT dashboard primary path with quota-controlled
    SerpApi fallback, and market opportunities use Polymarket Gamma with a
    `pizzint.watch` market-feed fallback when Gamma is inaccessible.
    Planned operator flows persist source loads, signal snapshots, Polymarket
    loads, opportunity snapshots, and alert-evaluation outputs in SQLite as
    historical records, with "latest" endpoints reading from the newest
    persisted snapshot.

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: health
    description: Service health and readiness
  - name: signals
    description: Current normalized signal snapshots
  - name: pizza-index
    description: Pizza Index targets, activity snapshots, and aggregate output
  - name: risk
    description: Conflict-risk scoring
  - name: markets
    description: Prediction-market comparison outputs
  - name: alerts
    description: Analyst-facing alert evaluation and history

paths:
  /health:
    get:
      tags: [health]
      summary: Service health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                default:
                  value:
                    status: ok
                    service: predict-strike-api
                    version: 0.1.0

  /api/v1/signals/latest:
    get:
      tags: [signals]
      summary: Get the latest normalized signal snapshot
      description: Returns the latest persisted multi-source signal snapshot from SQLite for the current four-source dashboard scope.
      operationId: getLatestSignals
      responses:
        "200":
          description: Latest snapshot returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalSnapshot"
              examples:
                default:
                  value:
                    generated_at: "2026-03-07T09:00:00Z"
                    region_focus: 42-48N / 30-36E sector
                    features:
                      flight_anomaly: 0.68
                      notam_spike: 0.34
                      satellite_buildup: 0.21
                      news_volume: 0.57
                      osint_activity: 0.46
                      pizza_index: 0.12
                    sources:
                      - name: OpenSky Network
                        status: active
                        mode: live
                        last_checked_at: "2026-03-07T08:55:00Z"
                      - name: NOTAM Feed
                        status: degraded
                        mode: fallback
                        last_checked_at: "2026-03-07T08:54:00Z"
                      - name: GDELT
                        status: degraded
                        mode: fallback
                        last_checked_at: "2026-03-07T08:50:00Z"
                      - name: Pizza Index Activity
                        status: active
                        mode: live
                        last_checked_at: "2026-03-07T08:58:00Z"

  /api/v1/signals/refresh:
    post:
      tags: [signals]
      summary: Force a fresh collection pass and persist a new signal snapshot
      description: |
        Dashboard-level orchestration action for the main `Refresh Signals`
        control.
        For each supported dashboard source in the current scope
        (`OpenSky Network`, `NOTAM Feed`, `GDELT`, and `Pizza Index Activity`),
        the planned behavior is:
        1. refresh source collection and persist a new source-load record
        2. recompute that source's derived signal from the refreshed data
        3. persist the consolidated latest signal snapshot in SQLite
      operationId: refreshSignals
      responses:
        "200":
          description: Signal snapshot refreshed and persisted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalSnapshot"
              examples:
                default:
                  value:
                    generated_at: "2026-03-07T09:05:00Z"
                    region_focus: 30-36N / 30-36E sector
                    features:
                      flight_anomaly: 0.72
                      notam_spike: 0.34
                      satellite_buildup: 0.21
                      news_volume: 0.57
                      osint_activity: 0.46
                      pizza_index: 0.12
                    sources:
                      - name: OpenSky Network
                        status: active
                        mode: live
                        last_checked_at: "2026-03-07T09:05:00Z"
                      - name: NOTAM Feed
                        status: degraded
                        mode: fallback
                        last_checked_at: "2026-03-07T09:05:00Z"
                      - name: GDELT
                        status: degraded
                        mode: fallback
                        last_checked_at: "2026-03-07T09:05:00Z"
                      - name: Pizza Index Activity
                        status: active
                        mode: live
                        last_checked_at: "2026-03-07T09:05:00Z"

  /api/v1/signals/refresh-source:
    post:
      tags: [signals]
      summary: Refresh a single collector-backed signal source
      description: |
        Dashboard-level per-source orchestration action for the pre-source
        status panel.
        The planned behavior is to refresh one selected source only, then
        recompute that source's derived signal, and finally persist an updated
        consolidated signal snapshot in SQLite.
        This endpoint is intentionally different from source-detail page
        `Refresh source` actions, which perform collection only without
        implicitly recomputing the signal.
      operationId: refreshSignalSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalSourceRefreshRequest"
            examples:
              default:
                value:
                  source_name: OpenSky Network
      responses:
        "200":
          description: Signal source refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalSourceRefreshResponse"
              examples:
                default:
                  value:
                    source:
                      name: OpenSky Network
                      status: active
                      mode: live
                      last_checked_at: "2026-03-07T09:06:00Z"
                    snapshot:
                      generated_at: "2026-03-07T09:06:00Z"
                      region_focus: 24-30N / 48-54E sector
                      features:
                        flight_anomaly: 0.74
                        notam_spike: 0.34
                        satellite_buildup: 0.21
                        news_volume: 0.57
                        osint_activity: 0.46
                        pizza_index: 0.12
                      sources:
                        - name: OpenSky Network
                          status: active
                          mode: live
                          last_checked_at: "2026-03-07T09:06:00Z"
                        - name: NOTAM Feed
                          status: degraded
                          mode: fallback
                          last_checked_at: "2026-03-07T09:05:00Z"
                        - name: GDELT
                          status: degraded
                          mode: fallback
                          last_checked_at: "2026-03-07T09:05:00Z"
                        - name: Pizza Index Activity
                          status: active
                          mode: live
                          last_checked_at: "2026-03-07T09:05:00Z"
        "400":
          description: Source does not support individual refresh
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required: [detail]
                properties:
                  detail:
                    type: string
              examples:
                default:
                  value:
                    detail: "Signal source does not support individual refresh: Pizza Index Activity"

  /api/v1/signals/sources/opensky-network/anomalies:
    get:
      tags: [signals]
      summary: Get the latest suspicious OpenSky flights
      description: |
        Returns the latest OpenSky-derived suspicious flight list used to
        explain the current flight anomaly score on the source detail page,
        along with the latest AI-generated strike assessment derived from the
        same snapshot.
        Entries are flagged when they match military-like callsign patterns,
        tanker or transport-like callsign families, concentration in the
        dominant suspicious flight sector for the current snapshot,
        low-altitude departures near known military airfields, or repeated
        military-like callsign clusters in the same snapshot.
      operationId: getOpenSkyAnomalies
      responses:
        "200":
          description: OpenSky anomaly list returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenSkyAnomaliesResponse"
              examples:
                default:
                  value:
                    generated_at: "2026-03-07T09:04:00Z"
                    status: active
                    flight_anomaly: 0.68
                    assessment:
                      status: ready
                      prompt_version: opensky-strike-v2
                      probability_percent: 64
                      countries:
                        - Ukraine
                        - Russia
                      explanation: Elevated military-adjacent airlift and tanker activity is concentrated in the current hotspot sector.
                    anomalies:
                      - icao24: abc123
                        callsign: RCH123
                        origin_country: United States
                        latitude: 44.12
                        longitude: 32.85
                        baro_altitude: 9750
                        velocity: 215
                        geo_altitude: 10100
                        reasons:
                          - military_like_callsign
                          - tanker_transport_pattern
                          - suspicious_region_concentration:42-48N / 30-36E sector
                          - military_callsign_cluster

  /api/v1/signals/sources/opensky-network/refresh-signal:
    post:
      tags: [signals]
      summary: Refresh the OpenSky signal assessment and snapshot
      description: |
        Source-detail action for the OpenSky page.
        Re-runs the OpenSky anomaly assessment workflow using the latest stored
        OpenSky source data and current anomaly list, calls the AI strike
        assessment service, and persists a new derived snapshot feature value
        plus inferred hotspot region.
        It does not perform a new upstream OpenSky collection pass.
      operationId: refreshOpenSkySignal
      responses:
        "200":
          description: OpenSky signal assessment refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenSkySignalRefreshResponse"
              examples:
                default:
                  value:
                    source:
                      name: OpenSky Network
                      status: active
                      mode: live
                      last_checked_at: "2026-03-07T09:06:00Z"
                    snapshot:
                      generated_at: "2026-03-07T09:06:00Z"
                      region_focus: Ukraine / Western Russia hotspot
                      features:
                        flight_anomaly: 0.64
                        notam_spike: 0.34
                        satellite_buildup: 0.21
                        news_volume: 0.57
                        osint_activity: 0.46
                        pizza_index: 0.12
                      sources:
                        - name: OpenSky Network
                          status: active
                          mode: live
                          last_checked_at: "2026-03-07T09:06:00Z"
                        - name: NOTAM Feed
                          status: degraded
                          mode: fallback
                          last_checked_at: "2026-03-07T09:05:00Z"
                        - name: GDELT
                          status: degraded
                          mode: fallback
                          last_checked_at: "2026-03-07T09:05:00Z"
                        - name: Pizza Index Activity
                          status: active
                          mode: live
                          last_checked_at: "2026-03-07T09:05:00Z"
                    assessment:
                      status: ready
                      prompt_version: opensky-strike-v2
                      probability_percent: 64
                      countries:
                        - Ukraine
                        - Russia
                      explanation: Elevated military-adjacent airlift and tanker activity remains concentrated in the current hotspot sector.

  /api/v1/signals/sources/gdelt/detail:
    get:
      tags: [signals]
      summary: Get the latest analyst-facing GDELT detail breakdown
      description: |
        Returns the latest GDELT-derived article breakdown used to explain the
        current `news_volume` feature on the dedicated source detail page.
        The canonical upstream for this slice is GDELT DOC 2.0 article-list
        output. The backend derives alert-share, signal-article counts,
        freshness-weighted AI assessment context, ranked themes, ranked regions,
        ranked source labels, and representative headlines from the latest
        collected article set.
      operationId: getGdeltDetail
      responses:
        "200":
          description: GDELT detail returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GdeltDetailResponse"
              examples:
                default:
                  value:
                    generated_at: "2026-03-07T09:04:30Z"
                    status: active
                    news_volume: 0.84
                    article_count: 18
                    alert_article_count: 7
                    signal_article_count: 8
                    freshness_score: 0.91
                    alert_share: 0.3889
                    volume_delta: null
                    top_regions:
                      - label: Black Sea
                        count: 6
                      - label: Eastern Mediterranean
                        count: 4
                    top_themes:
                      - label: Conflict & strikes
                        count: 5
                      - label: Mobilization & troop movement
                        count: 4
                    top_sources:
                      - label: reuters.com
                        count: 3
                      - label: apnews.com
                        count: 2
                    headlines:
                      - article_id: GDELT-1
                        title: Regional air defense posture tightens after overnight incidents
                        source: Reuters
                        source_label: reuters.com
                        published_at: "2026-03-07T08:45:00Z"
                        url: "https://example.com/headline-1"
                        is_alert: true
                        is_us_nato_actor: true
                        is_action_indicative: true
                        freshness_score: 0.85
                        themes:
                          - Conflict & strikes
                          - Airspace & aviation disruption
                        regions:
                          - Black Sea
                    assessment:
                      status: ready
                      prompt_version: gdelt-strike-v1
                      probability_percent: 84
                      target_region: Eastern Mediterranean
                      target_country: Syria
                      summary: Recent US/NATO-linked strike coverage is clustering around Syria and nearby force-posture reporting.
                      assessed_article_count: 8
                      freshness_score: 0.91
                    provenance:
                      source_url_configured: true
                      keyword_watchlist:
                        - AIRSTRIKE
                        - CONFLICT
                        - MISSILE
                        - MOBILIZATION
                        - STRIKE
                        - TROOPS
                      theme_derivation: Keyword-derived from article title and body text.
                      region_derivation: Keyword-derived from article title and body text.
                      comparison_basis: Signal refresh uses freshness-weighted, US/NATO-specific article selection with AI assessment; prior-window comparison is still unavailable.
                      collector_fallback_reason: null

  /api/v1/signals/sources/gdelt/refresh-signal:
    post:
      tags: [signals]
      summary: Refresh the GDELT signal assessment and snapshot
      description: |
        Source-detail action for the GDELT page.
        Re-runs the GDELT signal assessment using the latest stored GDELT
        article set, applies freshness-aware US/NATO action-indicative
        filtering, submits the representative article subset to the AI
        assessment service, and persists a new derived `news_volume` snapshot
        plus any inferred target region or country.
        It does not perform a new upstream GDELT collection pass.
      operationId: refreshGdeltSignal
      responses:
        "200":
          description: GDELT signal assessment refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GdeltSignalRefreshResponse"
              examples:
                default:
                  value:
                    source:
                      name: GDELT
                      status: active
                      mode: live
                      last_checked_at: "2026-03-07T09:08:00Z"
                    snapshot:
                      generated_at: "2026-03-07T09:08:00Z"
                      region_focus: Syria
                      features:
                        flight_anomaly: 0.68
                        notam_spike: 0.34
                        satellite_buildup: 0.21
                        news_volume: 0.84
                        osint_activity: 0.46
                        pizza_index: 0.12
                      sources:
                        - name: OpenSky Network
                          status: active
                          mode: live
                          last_checked_at: "2026-03-07T08:55:00Z"
                        - name: NOTAM Feed
                          status: degraded
                          mode: fallback
                          last_checked_at: "2026-03-07T08:54:00Z"
                        - name: GDELT
                          status: active
                          mode: live
                          last_checked_at: "2026-03-07T09:08:00Z"
                        - name: Pizza Index Activity
                          status: active
                          mode: live
                          last_checked_at: "2026-03-07T09:05:00Z"
                    assessment:
                      status: ready
                      prompt_version: gdelt-strike-v1
                      probability_percent: 84
                      target_region: Eastern Mediterranean
                      target_country: Syria
                      summary: Recent US/NATO-linked strike coverage is clustering around Syria and nearby force-posture reporting.
                      assessed_article_count: 8
                      freshness_score: 0.91

  /api/v1/pizza-index/targets:
