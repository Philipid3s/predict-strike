name: predict-strike

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    environment:
      BASIC_AUTH_USERNAME: ${FRONTEND_BASIC_AUTH_USERNAME}
      BASIC_AUTH_PASSWORD: ${FRONTEND_BASIC_AUTH_PASSWORD}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
