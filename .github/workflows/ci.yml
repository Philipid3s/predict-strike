name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate-agent-runtime-contracts:
    name: Validate Agent Runtime Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install --upgrade pip jsonschema
      - name: Validate schemas against fixtures
        run: python .github/scripts/validate_agent_runtime_contracts.py

  lint-and-test-frontend:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage
      - run: npm run build

  lint-and-test-backend:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . httpx
      - run: python -m unittest discover -s tests -p "test_*.py"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [validate-agent-runtime-contracts, lint-and-test-frontend, lint-and-test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
